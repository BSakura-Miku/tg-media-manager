services:
  web:
    image: tg-media-manager:base
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8787:8787"
    environment:
      MEDIA_ROOT: /media
      MEDIA_OUTPUT_ROOT: /media
      MEDIA_SOURCE_DIRS: ${MEDIA_SOURCE_DIRS:-}
      BROWSE_ROOTS: /media,/library,/incoming
      APP_DB: /data/tg_media_manager.sqlite3
      MODEL_ROOT: /models
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - /tmp/bssecondary_mount/BS-Media2/BS-Lsp/Tgdownloads/LSP:/media
      - ./data:/data
      - ./models:/models
    restart: unless-stopped

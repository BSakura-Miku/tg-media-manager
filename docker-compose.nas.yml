services:
  tg-media-manager:
    container_name: tg-media-manager
    image: ${TG_MEDIA_MANAGER_IMAGE:-bsakuramiku/tg-media-manager:clip-amd64}
    platform: linux/amd64
    restart: unless-stopped
    init: true
    # Defaults to root for compatibility with the existing NAS share and iGPU.
    # Set PUID/PGID to a NAS account after verifying /media, /data, /models and
    # /dev/dri/renderD128 are writable/readable by that account.
    user: "${PUID:-0}:${PGID:-0}"
    stop_grace_period: 2m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8787:8787"
    environment:
      TZ: Asia/Shanghai
      MEDIA_ROOT: /media
      MEDIA_OUTPUT_ROOT: /media
      MEDIA_SOURCE_DIRS: ${MEDIA_SOURCE_DIRS:-}
      BROWSE_ROOTS: /media,/library,/incoming
      APP_DB: /data/tg_media_manager.sqlite3
      MODEL_ROOT: /models
      WHISPER_MODEL_ROOT: /models/whisper
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
      XDG_CACHE_HOME: /models/cache
      INSIGHTFACE_HOME: /models/insightface
      SENSEVOICE_GGUF_MODEL: /models/sensevoice/SenseVoiceSmall.gguf
      SENSEVOICE_GGUF_URL: ${SENSEVOICE_GGUF_URL:-}
      CUSTOM_DETECTOR_ONNX_URL: ${CUSTOM_DETECTOR_ONNX_URL:-}
      APP_PASSWORD: ${APP_PASSWORD:?Set APP_PASSWORD in the NAS compose .env file}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in the NAS compose .env file}
      APP_LOCAL_ONLY: ${APP_LOCAL_ONLY:-false}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      APP_SESSION_TTL_SECONDS: ${APP_SESSION_TTL_SECONDS:-43200}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-}
      MODEL_ALLOW_HTTP_DOWNLOADS: ${MODEL_ALLOW_HTTP_DOWNLOADS:-false}
      MODEL_REQUIRE_SHA256_CUSTOM: ${MODEL_REQUIRE_SHA256_CUSTOM:-true}
      MODEL_MAX_DOWNLOAD_BYTES: ${MODEL_MAX_DOWNLOAD_BYTES:-17179869184}
      ENABLE_PERCEPTUAL_HASH: ${ENABLE_PERCEPTUAL_HASH:-false}
      ENABLE_QUICK_HASH: ${ENABLE_QUICK_HASH:-false}
      FFMPEG_HWACCEL: ${FFMPEG_HWACCEL:-vaapi}
      FFMPEG_HW_DEVICE: ${FFMPEG_HW_DEVICE:-/dev/dri/renderD128}
      FACE_PROVIDERS: ${FACE_PROVIDERS:-OpenVINOExecutionProvider,CPUExecutionProvider}
      OPENVINO_DEVICE: ${OPENVINO_DEVICE:-GPU}
      TRANSCRIPT_ENGINE: ${TRANSCRIPT_ENGINE:-stable-faster-whisper}
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
      WHISPER_STABLE_TIMESTAMPS: ${WHISPER_STABLE_TIMESTAMPS:-true}
      WHISPER_VAD_THRESHOLD: ${WHISPER_VAD_THRESHOLD:-0.5}
      WHISPER_MIN_SILENCE_MS: ${WHISPER_MIN_SILENCE_MS:-500}
      WHISPER_NO_SPEECH_THRESHOLD: ${WHISPER_NO_SPEECH_THRESHOLD:-0.6}
      WHISPER_LOG_PROB_THRESHOLD: ${WHISPER_LOG_PROB_THRESHOLD:--1.0}
      WHISPER_COMPRESSION_RATIO_THRESHOLD: ${WHISPER_COMPRESSION_RATIO_THRESHOLD:-2.4}
      SUBTITLE_MAX_CHARS: ${SUBTITLE_MAX_CHARS:-24}
      SUBTITLE_MAX_SECONDS: ${SUBTITLE_MAX_SECONDS:-7}
      SUBTITLE_MIN_SECONDS: ${SUBTITLE_MIN_SECONDS:-0.8}
      SUBTITLE_MAX_GAP: ${SUBTITLE_MAX_GAP:-0.8}
      GENERATE_TIMED_SUBTITLES: ${GENERATE_TIMED_SUBTITLES:-true}
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /volume4/BS-Secondary/BS-Media2/BS-Lsp/Tgdownloads/LSP:/media
      - ./data:/data
      - ./models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
